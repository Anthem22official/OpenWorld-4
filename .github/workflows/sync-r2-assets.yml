name: Sync R2 Assets

on:
  push:
    branches:
      - main
      - master
    paths:
      - "apps/gameplay/public/assets/database/**"
      - ".github/workflows/sync-r2-assets.yml"

jobs:
  sync-r2-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure R2 credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          aws-region: auto

      - name: Upload assets to R2
        env:
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws s3 sync apps/gameplay/public/assets/database "s3://${R2_BUCKET}/assets/database" \
            --endpoint-url "${R2_ENDPOINT}" \
            --no-progress
